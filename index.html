<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coin In Phone</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #07140d 0%, #020403 45%, #000 100%);
  overflow: hidden;
  touch-action: none;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  color: white;
}

#message {
  position: fixed;
  top: 26vh;
  width: 100%;
  text-align: center;
  font-size: 9vw;
  font-weight: bold;
  line-height: 1.5;
  text-shadow: 0 0 16px white;
  z-index: 10;
}

#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
}

.flashOn {
  animation: flash 0.28s ease-out;
}

@keyframes flash {
  0% { opacity: 0; }
  30% { opacity: 0.9; }
  100% { opacity: 0; }
}

#coin {
  position: absolute;
  width: 34vw;
  height: 34vw;
  max-width: 170px;
  max-height: 170px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  user-select: none;
  background: radial-gradient(circle at 32% 28%, #fff0a0 0%, #d99028 30%, #9a5a13 65%, #5c3108 100%);
  box-shadow: 0 0 35px rgba(255, 200, 80, 0.8), inset 0 0 18px rgba(60, 30, 0, 0.9);
  color: #5b2f05;
  font-size: 17vw;
  font-weight: 900;
}

#coin::before {
  content: "10";
  text-shadow: 1px 1px 0 #ffd98a;
}

/* coin10.pngを置いたら、下のコメントを外す
#coin {
  background: none;
  box-shadow: none;
}
#coin img {
  width: 100%;
  height: 100%;
  user-select: none;
  pointer-events: none;
}
*/

.pop {
  animation: pop 0.35s ease-out;
}

@keyframes pop {
  0% { transform: scale(0.2); opacity: 0; }
  70% { transform: scale(1.18); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.vanish {
  animation: vanish 0.25s ease-in forwards;
}

@keyframes vanish {
  to { transform: scale(0.1); opacity: 0; }
}
</style>
</head>

<body>

<div id="message">受け入れ<br>準備中...</div>
<div id="flash"></div>

<div id="coin">
  <!-- coin10.pngを使う時は次を有効化 -->
  <!-- <img src="coin10.png" alt="coin"> -->
</div>

<script>
const message = document.getElementById("message");
const coin = document.getElementById("coin");
const flash = document.getElementById("flash");

let targetX = window.innerWidth / 2 - 80;
let targetY = window.innerHeight / 2 - 80;
let x = targetX;
let y = targetY;
let dragging = false;
let offsetX = 0;
let offsetY = 0;
let gone = false;

function render() {
  x += (targetX - x) * 0.42;
  y += (targetY - y) * 0.42;
  coin.style.left = x + "px";
  coin.style.top = y + "px";
  requestAnimationFrame(render);
}
render();

setTimeout(() => {
  message.innerHTML = "スマホに<br>入れてください";
}, 1200);

setTimeout(() => {
  flash.classList.add("flashOn");
  message.innerHTML = "ポンッ！";
}, 2800);

setTimeout(() => {
  message.style.display = "none";
  coin.style.display = "flex";
  coin.classList.add("pop");
}, 3150);

coin.addEventListener("touchstart", e => {
  if (gone) return;
  dragging = true;
  const touch = e.touches[0];
  offsetX = touch.clientX - targetX;
  offsetY = touch.clientY - targetY;
}, { passive: false });

document.addEventListener("touchmove", e => {
  if (!dragging || gone) return;
  e.preventDefault();

  const touch = e.touches[0];
  targetX = touch.clientX - offsetX;
  targetY = touch.clientY - offsetY;

  const margin = 90;
  if (
    targetX < -margin ||
    targetX > window.innerWidth + margin ||
    targetY < -margin ||
    targetY > window.innerHeight + margin
  ) {
    gone = true;
    dragging = false;
    coin.classList.add("vanish");
    setTimeout(() => {
      coin.style.display = "none";
    }, 250);
  }
}, { passive: false });

document.addEventListener("touchend", () => {
  dragging = false;
});
</script>

</body>
</html>
